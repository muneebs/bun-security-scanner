name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch | minor | major)'
        required: true
        type: choice
        options: [patch, minor, major]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun tsc --noEmit

      - name: Lint
        run: bun run check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Bump version
        id: version
        run: |
          # Base the bump on the latest published npm version so that
          # package.json on main staying at a prior version doesn't cause
          # the same version to be published twice.
          PUBLISHED=$(npm show @nebzdev/bun-security-scanner version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            npm pkg set version="$PUBLISHED"
          fi
          npm version ${{ inputs.version }} --no-git-tag-version
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # We do not commit the version bump back to main: GITHUB_TOKEN cannot
      # bypass branch protection rules (required signed commits + CodeQL check).
      # The tag and release are created via the GitHub API instead, which works
      # without a direct push to the protected branch.
      - name: Create tag via GitHub API
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${process.env.VERSION}`,
              sha: context.sha,
            });

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.VERSION}`,
              name: `v${process.env.VERSION}`,
              generate_release_notes: true,
            });
